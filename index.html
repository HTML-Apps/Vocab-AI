<!DOCTYPE html>
<html lang="de" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flashcard-AI</title>

    <link rel="icon" href="brain.png" type="image/png">
    
    <!-- PWA Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-touch-fullscreen" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <meta name="theme-color" content="#000000">

    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="brain.png">

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">

    <!-- Cropper.js -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            corePlugins: { preflight: true },
            theme: {
                extend: {
                    colors: {
                        slate: {
                            50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0',
                            300: '#cbd5e1', 400: '#94a3b8', 500: '#64748b',
                            600: '#475569', 700: '#334155', 800: '#1e293b',
                            850: '#172033', 900: '#000000', 950: '#020617'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* ── CSS Custom Properties for theming ── */
        :root {
            --color-primary: #6366f1;
            --color-primary-hover: #4f46e5;
            --color-primary-light: rgba(99,102,241,0.15);
            --color-primary-shadow: rgba(99,102,241,0.35);
        }
        :root[data-accent="teal"] {
            --color-primary: #14b8a6;
            --color-primary-hover: #0d9488;
            --color-primary-light: rgba(20,184,166,0.15);
            --color-primary-shadow: rgba(20,184,166,0.35);
        }
        :root[data-accent="violet"] {
            --color-primary: #8b5cf6;
            --color-primary-hover: #7c3aed;
            --color-primary-light: rgba(139,92,246,0.15);
            --color-primary-shadow: rgba(139,92,246,0.35);
        }

        /* ── Base ── */
        body { -webkit-tap-highlight-color: transparent; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* ── Card flip ── */
        .perspective { perspective: 1000px; }
        .preserve-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .flip-transition { transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1); }

        /* ── Swipe animations ── */
        .swipe-left  { animation: swipeLeftOut  0.3s forwards; }
        .swipe-right { animation: swipeRightOut 0.3s forwards; }
        @keyframes swipeLeftOut  { to { transform: translateX(-100%) rotate(-10deg); opacity: 0; } }
        @keyframes swipeRightOut { to { transform: translateX(100%)  rotate(10deg);  opacity: 0; } }

        /* ── Accent-color utilities ── */
        .accent-bg     { background-color: var(--color-primary); }
        .accent-bg-hover:hover { background-color: var(--color-primary-hover); }
        .accent-text   { color: var(--color-primary); }
        .accent-border { border-color: var(--color-primary); }
        .accent-light  { background-color: var(--color-primary-light); }
        .accent-shadow { box-shadow: 0 8px 30px var(--color-primary-shadow); }
        .accent-ring:focus { outline: 2px solid var(--color-primary); outline-offset: 2px; }
        .nav-active    { color: var(--color-primary) !important; }

        /* ── Light/Dark surface colors ── */
        .bg-surface   { background-color: #f1f5f9; }
        .dark .bg-surface { background-color: #000000; }
        .bg-card      { background-color: #ffffff; }
        .dark .bg-card { background-color: #1e293b; }
        .border-subtle { border-color: #e2e8f0; }
        .dark .border-subtle { border-color: #334155; }
        .text-base    { color: #1e293b; }
        .dark .text-base { color: #e2e8f0; }
        .text-muted   { color: #64748b; }
        .dark .text-muted { color: #94a3b8; }

        /* ── Flashcard ── */
        #flashcard-wrapper {
            flex: 1 1 0%;
            min-height: 0;
            display: flex;
            flex-direction: column;
        }
        #flashcard-container {
            flex: 1 1 0%;
            min-height: 0;
            display: flex;
            align-items: stretch;
        }
        #flashcard-container > div {
            flex: 1 1 0%;
            min-height: 0;
        }
        #flashcard {
            width: 100%;
            height: 100%;
            min-height: 220px;
        }

        .deck-item { transition: transform 0.15s, box-shadow 0.15s; }
        .deck-item:active { transform: scale(0.98); }

        /* ── Modal overlay ── */
        .modal-overlay {
            position: fixed; inset: 0; z-index: 60;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(4px);
            display: flex; align-items: flex-end; justify-content: center;
        }
        .modal-sheet {
            width: 100%; max-width: 480px;
            border-radius: 1.5rem 1.5rem 0 0;
            padding: 1.5rem 1.5rem 2.5rem;
            animation: slideUp 0.28s cubic-bezier(0.32,0.72,0,1);
        }
        .dark .modal-sheet { background: #1e293b; }
        .modal-sheet { background: #fff; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        @keyframes badgePop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%       { transform: translateX(-6px); }
            40%       { transform: translateX(6px); }
            60%       { transform: translateX(-4px); }
            80%       { transform: translateX(4px); }
        }
        .animate-shake { animation: shake 0.5s ease; }

        /* ── Scan deck multiselect chips ── */
        .deck-chip {
            display: inline-flex; align-items: center; gap: 0.3rem;
            font-size: 0.7rem; font-weight: 700; line-height: 1;
            padding: 0.25rem 0.55rem;
            border-radius: 999px;
            background: var(--color-primary-light);
            color: var(--color-primary);
            border: 1.5px solid var(--color-primary);
            white-space: nowrap; max-width: 10rem; overflow: hidden; text-overflow: ellipsis;
        }
        .deck-option-row { display:flex; align-items:center; gap:0.75rem; padding:0.55rem 0.85rem; cursor:pointer; transition:background 0.12s; }
        .deck-option-row:hover { background: var(--color-primary-light); }
        .deck-option-row input[type=checkbox] { accent-color: var(--color-primary); width:1rem; height:1rem; flex-shrink:0; cursor:pointer; }

        .accent-dot {
            width: 1.4rem; height: 1.4rem;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: transform 0.15s, border-color 0.15s;
        }
        .accent-dot:hover { transform: scale(1.1); }
        .accent-dot.selected { border-color: white; box-shadow: 0 0 0 2px var(--color-primary); }

        .back-btn { cursor: pointer; }

        .lang-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            width: 100%;
            max-width: 24rem;
            padding: 0.9rem 1.5rem;
            border-radius: 1rem;
            font-size: 1rem;
            font-weight: 600;
            border: 2px solid transparent;
            transition: transform 0.15s, background 0.15s, border-color 0.15s;
            cursor: pointer;
        }
        .lang-btn:active { transform: scale(0.97); }
        .lang-btn.lang-de { background: var(--color-primary-light); color: var(--color-primary); border-color: var(--color-primary); }
        .lang-btn.lang-en { background: transparent; color: #64748b; border-color: #cbd5e1; }
        .dark .lang-btn.lang-en { color: #94a3b8; border-color: #334155; }
        .lang-btn.lang-selected { background: var(--color-primary); color: #fff; border-color: var(--color-primary); }

        .lang-toggle-btn {
            display: flex; align-items: center; gap: 0.4rem;
            font-size: 0.8rem; font-weight: 600; padding: 0.3rem 0.75rem;
            border-radius: 0.6rem; border: 1.5px solid var(--color-primary);
            color: var(--color-primary); background: transparent;
            cursor: pointer; transition: background 0.15s;
        }
        .lang-toggle-btn:hover { background: var(--color-primary-light); }

        /* ── Learn-mode active button ── */
        .learn-mode-btn { transition: background 0.15s, color 0.15s, border-color 0.15s; }
        .learn-mode-btn.active {
            background-color: var(--color-primary) !important;
            color: #fff !important;
            border-color: var(--color-primary) !important;
        }

        /* ── PWA Install Banner ── */
        #install-banner {
            display: none;
            position: fixed;
            bottom: 0; left: 0; right: 0;
            z-index: 9999;
            padding: 1rem 1.25rem calc(1.25rem + env(safe-area-inset-bottom));
            background: #ffffff;
            border-top: 1px solid #e2e8f0;
            box-shadow: 0 -4px 24px rgba(0,0,0,0.10);
            animation: slideUpBanner 0.32s cubic-bezier(0.32,0.72,0,1);
        }
        .dark #install-banner {
            background: #1e293b;
            border-top-color: #334155;
            box-shadow: 0 -4px 24px rgba(0,0,0,0.35);
        }
        @keyframes slideUpBanner {
            from { transform: translateY(100%); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }
        #install-banner.visible { display: block; }

        #install-android-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            width: 100%;
            padding: 0.85rem 1.25rem;
            border-radius: 1rem;
            font-size: 1rem;
            font-weight: 700;
            color: #fff;
            background-color: var(--color-primary);
            box-shadow: 0 4px 18px var(--color-primary-shadow);
            cursor: pointer;
            border: none;
            transition: background 0.15s, transform 0.12s;
        }
        #install-android-btn:active { transform: scale(0.97); }

        #install-ios-hint {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            padding: 0.85rem 1rem;
            border-radius: 1rem;
            background: var(--color-primary-light);
            border: 1.5px solid var(--color-primary);
        }
        #install-ios-hint .ios-icons {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            font-size: 1.2rem;
            color: var(--color-primary);
            flex-shrink: 0;
            margin-top: 0.05rem;
        }
        #install-ios-hint p {
            font-size: 0.875rem;
            font-weight: 500;
            line-height: 1.45;
            color: #1e293b;
        }
        .dark #install-ios-hint p { color: #e2e8f0; }

        #install-banner-close {
            position: absolute;
            top: 0.75rem; right: 1rem;
            font-size: 1.5rem;
            color: #ffffff;
            cursor: pointer;
            background: none;
            border: none;
            padding: 1.1rem;
            line-height: 1;
            transition: color 0.15s;
        }
        #install-banner-close:hover { color: var(--color-primary); }
    </style>
</head>

<body class="bg-surface text-base transition-colors duration-300 h-screen w-screen overflow-hidden flex flex-col font-sans relative">

    <input type="file" id="backup-input" class="hidden" accept=".json" onchange="importData(event)">

    <!-- ═══ HEADER ═══ -->
    <header id="main-header" class="hidden flex-shrink-0 flex justify-between items-center px-5 py-3 z-10 bg-surface border-b border-subtle">
        <div class="flex items-center gap-2">
            <button id="header-back-btn" class="back-btn hidden accent-text mr-1" onclick="handleBackBtn()">
                <i class="fa-solid fa-chevron-left text-lg"></i>
            </button>
            <h1 class="text-lg font-bold tracking-tight" id="header-title">Flashcard-AI</h1>
        </div>
        <div class="flex gap-3 items-center">
            <button onclick="triggerImport()" class="text-muted hover:accent-text transition" data-i18n-title="import_title">
                <i class="fa-solid fa-upload text-lg"></i>
            </button>
            <button onclick="downloadData()" class="text-muted hover:accent-text transition" data-i18n-title="export_title">
                <i class="fa-solid fa-download text-lg"></i>
            </button>
            <button onclick="openSettingsModal()" class="text-muted hover:accent-text transition" data-i18n-title="settings_title">
                <i class="fa-solid fa-sliders text-lg"></i>
            </button>
        </div>
    </header>

    <!-- ═══ MAIN ═══ -->
    <main class="flex-1 overflow-y-auto hide-scrollbar relative z-0" id="main-container">

        <!-- ─── View: Onboarding ─── -->
        <section id="view-onboarding" class="absolute inset-0 flex flex-col justify-center items-center p-8 bg-surface z-50 hidden">
            <div class="absolute top-4 right-5 flex gap-3 items-center">
                <div class="flex gap-2 items-center">
                    <button class="accent-dot" data-accent="indigo" style="background:#6366f1" onclick="setAccent('indigo')" title="Indigo"></button>
                    <button class="accent-dot" data-accent="teal"   style="background:#14b8a6" onclick="setAccent('teal')"   title="Teal"></button>
                    <button class="accent-dot" data-accent="violet" style="background:#8b5cf6" onclick="setAccent('violet')" title="Violet"></button>
                </div>
                <button onclick="toggleTheme()" class="text-muted hover:accent-text transition ml-1">
                    <i class="fa-solid fa-moon text-xl" id="theme-icon-onboarding"></i>
                </button>
            </div>

            <div class="w-20 h-20 accent-bg rounded-3xl flex items-center justify-center mb-6 accent-shadow">
                <i class="fa-solid fa-brain text-white text-4xl"></i>
            </div>

            <div class="flex gap-3 mb-7 w-full max-w-sm">
                <button id="lang-btn-de" class="lang-btn lang-de flex-1" onclick="setLanguage('de')">🇩🇪 Deutsch</button>
                <button id="lang-btn-en" class="lang-btn lang-en flex-1" onclick="setLanguage('en')">🇺🇸 English</button>
            </div>

            <h2 class="text-3xl font-bold mb-3 text-center whitespace-pre-line" data-i18n="onboarding_title"></h2>
            <p class="text-sm text-muted text-center mb-8 max-w-xs" data-i18n="onboarding_subtitle"></p>

            <div class="space-y-5 w-full max-w-sm">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-full accent-light accent-text flex justify-center items-center font-bold flex-shrink-0">1</div>
                    <p class="text-sm" data-i18n="onboarding_step1"></p>
                </div>
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-full accent-light accent-text flex justify-center items-center font-bold flex-shrink-0">2</div>
                    <p class="text-sm" data-i18n="onboarding_step2"></p>
                </div>
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-full accent-light accent-text flex justify-center items-center font-bold flex-shrink-0">3</div>
                    <p class="text-sm" data-i18n="onboarding_step3"></p>
                </div>
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-full accent-light accent-text flex justify-center items-center font-bold flex-shrink-0">4</div>
                    <p class="text-sm" data-i18n="onboarding_step4"></p>
                </div>
            </div>

            <div class="mt-8 w-full max-w-sm">
                <label id="agb-label" class="flex items-start gap-3 cursor-pointer select-none">
                    <input type="checkbox" id="agb-checkbox"
                           class="mt-0.5 w-5 h-5 flex-shrink-0 rounded accent-checkbox cursor-pointer"
                           style="accent-color: var(--accent);">
                    <span id="agb-label-text" class="text-sm text-muted leading-snug"></span>
                </label>
                <p id="agb-error" class="mt-2 text-xs text-red-500 hidden" data-i18n="onboarding_agb_error"></p>
            </div>

            <button onclick="finishOnboarding()" class="mt-4 w-full max-w-sm accent-bg accent-bg-hover text-white py-4 rounded-2xl font-bold accent-shadow transition-colors active:scale-95" data-i18n="onboarding_cta"></button>
        </section>

        <!-- ─── View: Scan ─── -->
        <section id="view-scan" class="view hidden flex flex-col px-5 pt-4 pb-4 min-h-full">
            <div id="backup-warning" class="w-full mb-4 bg-amber-500/10 border border-amber-500/30 text-amber-600 dark:text-amber-400 rounded-2xl p-3 text-xs flex justify-between items-center hidden">
                <span><i class="fa-solid fa-triangle-exclamation mr-2"></i><span data-i18n="backup_warning"></span></span>
                <div class="flex items-center gap-2 flex-shrink-0">
                    <button onclick="downloadData()" class="underline font-bold ml-2 whitespace-nowrap" data-i18n="backup_save"></button>
                    <button onclick="dismissBackupWarning()" class="ml-1 text-amber-600 dark:text-amber-400 hover:opacity-70 transition text-base leading-none font-bold" title="Schließen">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>
            </div>

            <div class="mb-4">
                <label class="text-xs font-semibold text-muted uppercase tracking-wider mb-1 block" data-i18n="scan_deck_label"></label>
                <!-- Compact chip-dropdown multiselect -->
                <div id="scan-deck-multiselect" class="relative">
                    <!-- Trigger row -->
                    <button type="button" id="scan-deck-trigger"
                        onclick="toggleScanDeckDropdown()"
                        class="w-full bg-card border border-subtle rounded-xl px-3 py-2.5 text-sm font-medium accent-ring focus:outline-none dark:bg-slate-800 flex items-center justify-between gap-2 text-left">
                        <div id="scan-deck-chips" class="flex flex-wrap gap-1.5 flex-1 min-w-0"></div>
                        <i id="scan-deck-chevron" class="fa-solid fa-chevron-down text-muted flex-shrink-0 transition-transform duration-200 text-xs"></i>
                    </button>
                    <!-- Dropdown panel -->
                    <div id="scan-deck-dropdown"
                        class="hidden absolute left-0 right-0 z-50 mt-1 bg-card border border-subtle rounded-xl shadow-lg overflow-hidden dark:bg-slate-800"
                        style="max-height:11rem;overflow-y:auto;">
                        <div id="scan-deck-options" class="py-1"></div>
                    </div>
                </div>
            </div>

            <input type="file" id="scan-file-input" class="hidden" accept="image/*" capture="environment" onchange="handleImageSelected(event)">
            <input type="file" id="scan-gallery-input" class="hidden" accept="image/*" onchange="handleImageSelected(event)">

            <div class="flex-1 flex flex-col justify-center items-center">
                <div id="scan-preview-area" class="w-full aspect-square max-h-74 rounded-3xl border-2 border-dashed border-subtle flex flex-col items-center justify-center p-6 text-center mb-6 relative overflow-hidden bg-card shadow-sm cursor-pointer active:scale-98 transition-transform" onclick="document.getElementById('scan-file-input').click()">
                    <div id="scan-placeholder" class="flex flex-col items-center">
                        <i class="fa-solid fa-camera text-5xl text-muted mb-4"></i>
                        <p class="text-sm text-muted font-medium" data-i18n="scan_placeholder_main"></p>
                        <p class="text-xs text-muted mt-1 opacity-60" data-i18n="scan_placeholder_sub"></p>
                    </div>
                    <img id="scan-preview-img" src="" alt="Preview" class="hidden absolute inset-0 w-full h-full object-contain rounded-3xl">
                    <div id="scan-loader" class="absolute inset-0 bg-white/90 dark:bg-slate-800/90 flex flex-col items-center justify-center hidden backdrop-blur-sm rounded-3xl">
                        <i class="fa-solid fa-circle-notch fa-spin accent-text text-4xl mb-4"></i>
                        <p class="text-sm font-medium animate-pulse" id="scan-loader-text" data-i18n="scan_loader_analyzing"></p>
                    </div>
                </div>

                <div id="scan-error" class="hidden w-full mb-4 bg-red-500/10 border border-red-400/40 text-red-500 dark:text-red-400 rounded-2xl p-3 text-xs flex items-start gap-2">
                    <i class="fa-solid fa-circle-exclamation mt-0.5 flex-shrink-0"></i>
                    <span id="scan-error-text"></span>
                </div>

                <div class="w-full flex flex-col gap-3">
                    <div class="flex gap-2 w-full">
                        <button onclick="document.getElementById('scan-file-input').click()" class="flex-1 border accent-border accent-text py-3 rounded-2xl font-semibold hover:accent-light transition flex justify-center items-center gap-2 active:scale-95 text-sm">
                            <i class="fa-solid fa-camera"></i> <span data-i18n="scan_camera_btn"></span>
                        </button>
                        <button onclick="document.getElementById('scan-gallery-input').click()" class="flex-1 border accent-border accent-text py-3 rounded-2xl font-semibold hover:accent-light transition flex justify-center items-center gap-2 active:scale-95 text-sm">
                            <i class="fa-solid fa-image"></i> <span data-i18n="scan_gallery_btn"></span>
                        </button>
                    </div>
                    <button id="scan-btn" onclick="startAIScan()" disabled class="w-full accent-bg accent-bg-hover text-white py-4 rounded-2xl font-bold accent-shadow transition-colors active:scale-95 flex justify-center items-center gap-2 disabled:opacity-40 disabled:cursor-not-allowed disabled:active:scale-100">
                        <i class="fa-solid fa-wand-magic-sparkles"></i> <span data-i18n="scan_step2_btn"></span>
                    </button>
                </div>
            </div>
        </section>

        <!-- ─── View: Lernen / Learn ─── -->
        <section id="view-learn" class="view hidden flex flex-col px-5 pt-3 pb-4 relative" style="height:100%">
            <!-- Dynamisches Banner für Learn-Modi -->
            <div id="learn-banner" class="absolute top-16 left-1/2 transform -translate-x-1/2 bg-slate-800 dark:bg-white text-white dark:text-black px-4 py-2 rounded-full text-sm font-bold opacity-0 pointer-events-none transition-opacity duration-300 z-50 shadow-lg text-center whitespace-nowrap"></div>

            <div id="learn-deck-selector" class="hidden flex flex-col items-center justify-center h-full py-8">
                <div class="w-16 h-16 accent-bg rounded-2xl flex items-center justify-center mb-6 accent-shadow">
                    <i class="fa-solid fa-layer-group text-white text-2xl"></i>
                </div>
                <h3 class="text-xl font-bold mb-2" data-i18n="learn_pick_title"></h3>
                <p class="text-sm text-muted mb-6 text-center" data-i18n="learn_pick_subtitle"></p>
                <div id="learn-deck-list" class="w-full max-w-sm space-y-3"></div>
            </div>

            <div id="learn-session" class="hidden flex flex-col h-full">
                <!-- Neue Buttons für Chronologisch, Zufall und Richtung -->
                <div class="flex justify-between items-center mb-4 flex-shrink-0">

    let currentLang = 'de';

    }

    function setLanguage(lang) {
        if (lang !== 'de' && lang !== 'en') return;
        currentLang = lang;
        localStorage.setItem('language', lang);
        document.documentElement.lang = lang;

        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.dataset.i18n;
            const val = t(key);
            if (typeof val === 'string') el.innerHTML = val;
        });

        document.querySelectorAll('[data-i18n-title]').forEach(el => {
            const key = el.dataset.i18nTitle;
            const val = t(key);
            if (typeof val === 'string') el.title = val;
        });

        updateGoalUI();

        updateScanCounterUI();
        renderAgbLabel();

        if (activeView) {
            const id = activeView.id;
            if (id === 'view-list')        renderDeckOverview();
            if (id === 'view-deck-detail') renderDeckDetail();
            if (id === 'view-learn')       initLearnView();
            if (id === 'view-scan')        populateScanDeckSelector();
        }
    }

    function _updateLangButtons(lang) {
        ['de', 'en'].forEach(l => {
            const btn = document.getElementById(`lang-btn-${l}`);
            if (!btn) return;
            btn.classList.toggle('lang-selected', l === lang);
            btn.classList.toggle('lang-de', l === 'de' && l !== lang);
            btn.classList.toggle('lang-en', l === 'en' && l !== lang);
        });
        const settDe = document.getElementById('settings-lang-de');
        const settEn = document.getElementById('settings-lang-en');
        if (settDe) settDe.style.opacity = lang === 'de' ? '1' : '0.45';
        if (settEn) settEn.style.opacity = lang === 'en' ? '1' : '0.45';
    }

    function initLanguage() {
        const saved = localStorage.getItem('language');
        if (saved === 'de' || saved === 'en') {
            currentLang = saved;
        } else {
            const browserLang = navigator.language || navigator.userLanguage || '';
            currentLang = browserLang.toLowerCase().startsWith('de') ? 'de' : 'en';
        }
        setLanguage(currentLang);
    }

    // ══════════════════════════════════════════════
    //  IndexedDB Layer
    // ══════════════════════════════════════════════
    const DB_NAME    = 'VocabAI';
    const DB_VERSION = 1;
    const STORE_META         = 'meta';
    const CURRENT_AGB_VERSION = '1.0';
    const STORE_DECKS = 'decks';

    let db = null;

    function openDB() {
        return new Promise((resolve, reject) => {
            const req = indexedDB.open(DB_NAME, DB_VERSION);
            req.onupgradeneeded = e => {
                const d = e.target.result;
                if (!d.objectStoreNames.contains(STORE_META)) d.createObjectStore(STORE_META);
                if (!d.objectStoreNames.contains(STORE_DECKS)) d.createObjectStore(STORE_DECKS, { keyPath: 'id' });
            };
            req.onsuccess = e => { db = e.target.result; resolve(db); };
            req.onerror   = e => reject(e.target.error);
        });
    }

    function dbGet(store, key) {
        return new Promise((resolve, reject) => {
            const tx  = db.transaction(store, 'readonly');
            const req = tx.objectStore(store).get(key);
            req.onsuccess = () => resolve(req.result);
            req.onerror   = e => reject(e.target.error);
        });
    }

    function dbPut(store, value, key) {
        return new Promise((resolve, reject) => {
            const tx  = db.transaction(store, 'readwrite');
            const req = key !== undefined ? tx.objectStore(store).put(value, key) : tx.objectStore(store).put(value);
            req.onsuccess = () => resolve();
            req.onerror   = e => reject(e.target.error);
        });
    }

    function dbDelete(store, key) {
        return new Promise((resolve, reject) => {
            const tx  = db.transaction(store, 'readwrite');
            const req = tx.objectStore(store).delete(key);
            req.onsuccess = () => resolve();
            req.onerror   = e => reject(e.target.error);
        });
    }

    function dbGetAll(store) {
        return new Promise((resolve, reject) => {
            const tx  = db.transaction(store, 'readonly');
            const req = tx.objectStore(store).getAll();
            req.onsuccess = () => resolve(req.result);
            req.onerror   = e => reject(e.target.error);
        });
    }

    async function loadDecks() {
        decks = await dbGetAll(STORE_DECKS);
        decks.sort((a, b) => {
            if (a.id === 'difficult_deck') return 1;
            if (b.id === 'difficult_deck') return -1;
            return a.id - b.id;
        });
        
        // MIGRATION: en/de -> front/back auto konvertieren
        let needsSave = false;
        decks.forEach(deck => {
            deck.words.forEach(w => {
                if (w.en !== undefined) { w.front = w.en; delete w.en; needsSave = true; }
                if (w.de !== undefined) { w.back = w.de; delete w.de; needsSave = true; }
            });
        });

        // MIGRATION: difficultPairs aus appState -> difficult_deck
        const savedState = await dbGet(STORE_META, 'appState');
        if (savedState && savedState.difficultPairs && savedState.difficultPairs.length > 0) {
            let diffDeck = decks.find(d => d.id === 'difficult_deck');
            if (!diffDeck) {
                diffDeck = { id: 'difficult_deck', name: '⚠️ Schwierige Wortpaare', words: [] };
            }
            savedState.difficultPairs.forEach(p => {
                if (!diffDeck.words.some(w => w.id === p.id)) {
                    diffDeck.words.push({ id: p.id, front: p.front, back: p.back });
                }
            });
            await dbPut(STORE_DECKS, diffDeck);
            const idx = decks.findIndex(d => d.id === 'difficult_deck');
            if (idx >= 0) decks[idx] = diffDeck; else decks.push(diffDeck);
            // difficultPairs aus appState entfernen
            delete savedState.difficultPairs;
            await dbPut(STORE_META, savedState, 'appState');
        }

        if (decks.filter(d => d.id !== 'difficult_deck').length === 0) {
            const defName = currentLang === 'de' ? 'Standard-Liste' : 'Default List';
            const def = { id: Date.now(), name: defName, words: [] };
            await dbPut(STORE_DECKS, def);
            decks.unshift(def);
        } else if (needsSave) {
            // Alle konvertierten Listen speichern
            for (const deck of decks) { await dbPut(STORE_DECKS, deck); }
        }
    }

    async function saveDeck(deck) {

    function importData(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async function(e) {
            try {
                const data = JSON.parse(e.target.result);
                if (Array.isArray(data) && data.length > 0 && data[0].words !== undefined) {
                    let imported = 0;
                    for (const deck of data) {
                        // Dynamisch auf front/back konvertieren
                        deck.words = deck.words.map(w => ({
                            id: w.id || Date.now() + Math.random(),
                            front: w.front || w.en || '',
                            back: w.back || w.de || ''
                        }));
                        const existing = decks.find(d => d.id === deck.id);
                        if (!existing) { await saveDeck(deck); imported += deck.words.length; }
                    }
                    appState.lastBackupWordCount = totalWordCount();
                    await saveState();
                    alert(t('alert_import_success')(imported));
                } else if (Array.isArray(data) && (data[0]?.en || data[0]?.front)) {
                    // Legacy import Format Fallback
                    const target = decks[0];
                    const existingWords = new Set(target.words.map(w => (w.front).toLowerCase()));
                    const newWords = data
                        .filter(w => (w.front && w.back) || (w.en && w.de))
                        .map(w => ({
                            id: Date.now() + Math.random(),
                            front: w.front || w.en,
                            back: w.back || w.de
                        }))
                        .filter(w => !existingWords.has(w.front.toLowerCase()));
                    target.words = [...newWords, ...target.words];
                    await saveDeck(target);
                    appState.lastBackupWordCount = totalWordCount();
                    await saveState();
                    alert(t('alert_import_legacy')(newWords.length, target.name));
                } else {
                    alert(t('alert_import_unknown'));
                    return;
                }
                const onboarded = await dbGet(STORE_META, 'onboarded');
                if (onboarded) switchView('list'); else finishOnboarding();
            } catch (err) {
                alert(t('alert_import_error'));
            }
        };
        reader.readAsText(file);
        event.target.value = '';
    }

    async function startAIScan() {
        if (!_scanImageBase64) { setScanError(t('scan_no_image')); return; }

        // Lizenzschlüssel und Free-Trial-Logik
        const licenseKey = localStorage.getItem('focus_license_key') || '';
        const FREE_TRIAL_LIMIT = 5;
        if (!licenseKey) {
            if ((appState.scanCount || 0) >= FREE_TRIAL_LIMIT) {
                setScanError(t('scan_error_limit_reached'));
                openSettingsModal();
                return;
            }
            // Free Trial: Scan erlaubt (scanCount < 5)
        }

        const loader     = document.getElementById('scan-loader');
        const loaderText = document.getElementById('scan-loader-text');
        const scanBtn    = document.getElementById('scan-btn');

        setScanError('');
        loader.classList.remove('hidden');
        if (loaderText) loaderText.textContent = t('scan_loader_uploading');
        scanBtn.disabled = true;

        try {
            if (loaderText) loaderText.textContent = t('scan_loader_ai');

            const response = await fetch('/api/scan', {
                method: 'POST',
                // NEU: Authorization Header hinzugefügt
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${licenseKey || 'FREE_TRIAL'}`
                },
                body: JSON.stringify({ image: _scanImageBase64 }),
            });

            // HTTP 429 → Limit vom Backend erreicht
            if (!response.ok) {
                if (response.status === 429) {
                    throw new Error('LIMIT_REACHED');
                }
                let errData = {};
                try { errData = await response.json(); } catch (_) {}
                throw new Error(errData.error || `HTTP ${response.status}`);
            }

            const data = await response.json();

            const pairs = data.pairs;
            if (!Array.isArray(pairs) || pairs.length === 0) throw new Error(t('scan_no_vocab'));

            const checked = document.querySelectorAll('.scan-deck-checkbox:checked');
            pendingDeckIds = checked.length > 0
                ? Array.from(checked).map(cb => parseInt(cb.value))
                : (decks.length > 0 ? [decks[0].id] : []);

            pendingScanPairs = pairs.map((p, i) => ({
                id: Date.now() + i,
                front: (p.front || p.en || '').trim(),
                back:  (p.back || p.de || '').trim(),
            })).filter(w => w.front && w.back);

            loader.classList.add('hidden');
            _scanImageBase64 = null;
            const previewImg  = document.getElementById('scan-preview-img');
            const placeholder = document.getElementById('scan-placeholder');
            if (previewImg)  { previewImg.src = ''; previewImg.classList.add('hidden'); }
            if (placeholder) { placeholder.classList.remove('hidden'); }
            scanBtn.disabled = true;

            // Scan-Zähler: bevorzugt echten Stand vom Backend übernehmen
            if (data.usage && data.usage.current) {
                appState.scanCount = data.usage.current;
            } else {
                appState.scanCount = (appState.scanCount || 0) + 1;
            }
            await saveState();
            renderScanPreview();
            document.getElementById('scan-preview-modal').classList.remove('hidden');

        } catch (err) {
            console.error('AI scan error:', err);
            loader.classList.add('hidden');
            scanBtn.disabled = false;
            if (err.message === 'LIMIT_REACHED') {
                setScanError(t('scan_error_limit_reached'));
                openSettingsModal();
            } else {
                setScanError(err.message || t('scan_no_vocab'));
            }
        }
    }

    function showSaveToast(count) {
        const toast = document.getElementById('save-toast');
        const text  = document.getElementById('save-toast-text');
        if (!toast || !text) return;
        text.textContent = t('toast_word_pairs_saved')(count);
        toast.style.opacity = '1';
        toast.style.transform = 'translateX(-50%) translateY(0)';
        clearTimeout(toast._hideTimer);

            toast.style.opacity = '0';
            toast.style.transform = 'translateX(-50%) translateY(8px)';

    async function confirmScanPreview() {
        const savedCount = pendingScanPairs.length;
        let lastDeckId = null;

        const targetIds = pendingDeckIds.length > 0 ? pendingDeckIds : (decks.length > 0 ? [decks[0].id] : []);

        for (const deckId of targetIds) {
            let deck = decks.find(d => d.id === deckId);
            if (!deck) {
                deck = { id: Date.now(), name: currentLang === 'de' ? 'Neue Liste' : 'New List', words: [] };
            }
            deck.words = [...deck.words, ...pendingScanPairs.map(p => ({ ...p, id: Date.now() + Math.random() }))];
            await saveDeck(deck);
            lastDeckId = deck.id;
        }

        await saveState();
        closeScanPreview();
        showSaveToast(savedCount);
        if (lastDeckId) {
            currentDetailDeckId = lastDeckId;
            switchView('deck-detail');
        }
    }

        const deck = decks.find(d => d.id === currentDetailDeckId);

        const front = prompt(t('prompt_vocab_front'));
        if (!front) return;

    async function editVocab(idx) {
        const deck = decks.find(d => d.id === currentDetailDeckId);
        if (!deck) return;
        const w = deck.words[idx];
        const front = prompt(t('prompt_vocab_front_edit'), w.front);

    function initRemainingIndices() {
        const words = window._learnWords || [];
        remainingIndices = Array.from({length: words.length}, (_, i) => i);
        // aktuellen Index kurz entfernen, falls nicht letzte Karte
        if(words.length > 1) {
            remainingIndices = remainingIndices.filter(i => i !== currentCardIndex);
        }
        if (remainingIndices.length === 0 && words.length > 0) {
            remainingIndices = Array.from({length: words.length}, (_, i) => i);

    function toggleLearnDirection() {
        learnDirectionReversed = !learnDirectionReversed;

        showLearnBanner('learn_mode_swap');

    function getDynamicTextSize(text) {
        if (!text) return 'text-4xl';
        const len = text.length;
        if (len < 20) return 'text-4xl';
        if (len < 50) return 'text-3xl';
        if (len < 100) return 'text-2xl';
        if (len < 150) return 'text-xl';
        return 'text-lg';
    }

    // Liefert inline-style für einzelne lange Wörter ohne Leerzeichen
    function getSingleWordStyle(text) {
        if (!text || text.trim().includes(' ') || text.trim().includes('\n')) return '';
        const len = text.trim().length;
        // Für kurze Wörter kein spezielles Scaling nötig
        if (len <= 15) return '';
        // clamp(min, preferred, max) – je länger das Wort, desto kleiner der bevorzugte Wert
        // preferred: 90vw / len * 1.7 (Näherung für zeichenbreite)
        const preferred = Math.max(0.8, Math.min(2.2, 28 / len));
        return `white-space: nowrap; font-size: clamp(0.75rem, ${preferred.toFixed(2)}em + 1vw, 2.5rem);`;
    }

    function initLearnView() {
        const selector = document.getElementById('learn-deck-selector');
        const session  = document.getElementById('learn-session');
        const decksWithWords = decks.filter(d => d.id !== 'difficult_deck' && d.words.length > 0);
        const diffDeck = decks.find(d => d.id === 'difficult_deck');
        const diffCount = diffDeck ? diffDeck.words.length : 0;

        // Immer Session wiederherstellen wenn lastLearnDeckId gesetzt ist
        if (appState.lastLearnDeckId === 'all' && decksWithWords.length > 0) {
            startLearnSession('all'); return;
        }
        if (appState.lastLearnDeckId === 'difficult' && diffCount > 0) {
            startLearnSession('difficult'); return;
        }
        if (appState.lastLearnDeckId && appState.lastLearnDeckId !== 'all' && appState.lastLearnDeckId !== 'difficult') {
            const savedDeck = decks.find(d => d.id === appState.lastLearnDeckId && d.id !== 'difficult_deck' && d.words.length > 0);
            if (savedDeck) { startLearnSession(savedDeck.id); return; }
        }

        // Kein gespeicherter State: Selector anzeigen
        selector.classList.remove('hidden');
        session.classList.add('hidden');

        const list = document.getElementById('learn-deck-list');
        list.innerHTML = '';

        if (decksWithWords.length === 0 && diffCount === 0) {
            list.innerHTML = `<p class="text-center text-muted text-sm">${t('learn_no_vocab_empty')}</p>`;
            return;
        }

        if (decksWithWords.length > 1) {
            const allBtn = document.createElement('button');
            allBtn.className = 'w-full bg-card border border-subtle rounded-2xl p-4 flex justify-between items-center accent-text font-bold text-sm';
            const total = decksWithWords.reduce((s, d) => s + d.words.length, 0);
            allBtn.innerHTML = `<span>${t('learn_all_lists')}</span><span class="text-muted font-normal">${total} ${t('learn_words_suffix')}</span>`;
            allBtn.onclick = () => startLearnSession('all');
            list.appendChild(allBtn);
        }

        // Schwierige Wortpaare Button (aus difficult_deck)
        if (diffCount > 0) {
            const diffBtn = document.createElement('button');
            diffBtn.className = 'w-full bg-card border border-red-400/40 rounded-2xl p-4 flex justify-between items-center text-red-500 dark:text-red-400 font-bold text-sm';
            diffBtn.innerHTML = `<span><i class="fa-solid fa-brake-warning mr-0"></i>${t('learn_difficult')}</span><span class="font-normal opacity-70">${diffCount} ${t('learn_words_suffix')}</span>`;
            diffBtn.onclick = () => startLearnSession('difficult');
            list.appendChild(diffBtn);
        }

        decksWithWords.forEach(d => {
            const btn = document.createElement('button');
            btn.className = 'w-full bg-card border border-subtle rounded-2xl p-4 flex justify-between items-center text-sm';
            btn.innerHTML = `<span class="font-semibold truncate pr-2">${escapeHtml(d.name)}</span><span class="text-muted whitespace-nowrap">${d.words.length} ${t('learn_words_suffix')} <i class="fa-solid fa-chevron-right ml-1 text-xs"></i></span>`;
            btn.onclick = () => startLearnSession(d.id);
            list.appendChild(btn);
        });
    }

    async function startLearnSession(deckIdOrAll) {
        let words = [], label = '';
        if (deckIdOrAll === 'all') {
            words = decks.filter(d => d.id !== 'difficult_deck').flatMap(d => d.words);
            label = t('learn_all_lists');
            currentLearnDeck = null;
            appState.lastLearnDeckId = 'all';
            await saveState();
        } else if (deckIdOrAll === 'difficult') {
            const diffDeck = decks.find(d => d.id === 'difficult_deck');
            words = diffDeck ? diffDeck.words.map(p => ({ id: p.id, front: p.front, back: p.back })) : [];
            label = t('learn_difficult');
            currentLearnDeck = null;
            appState.lastLearnDeckId = 'difficult';
            await saveState();
        } else {
            const deck = decks.find(d => d.id === deckIdOrAll);
            if (!deck) return;
            words = deck.words;
            label = deck.name;
            currentLearnDeck = deck;
            appState.lastLearnDeckId = deck.id;
            await saveState();
        }

        document.getElementById('learn-deck-name-label').textContent = label;
        document.getElementById('learn-deck-selector').classList.add('hidden');
        document.getElementById('learn-session').classList.remove('hidden');

        // Initiale Aktivmarkierung der Modus-Buttons
        const btnChrono = document.getElementById('learn-btn-chrono');
        const btnRandom = document.getElementById('learn-btn-random');
        if (btnChrono) btnChrono.classList.toggle('active', learnMode === 'chrono');
        if (btnRandom) btnRandom.classList.toggle('active', learnMode === 'random');

        currentCardIndex = 0;
        isCardFlipped    = false;
        window._learnWords = words;
        if(learnMode === 'random') initRemainingIndices();
        updateLearnCounter();
        renderFlashcard();
    }

    function exitLearnSession() {
        currentLearnDeck = null;
        window._learnWords = [];
        appState.lastLearnDeckId = null;
        saveState();
        initLearnView();
    }

    function updateLearnCounter() {
        const el = document.getElementById('learn-counter');
        if (el) el.textContent = `${appState.learnedToday} / ${appState.dailyGoal}`;
    }

    function renderFlashcard() {
        const container  = document.getElementById('flashcard-container');
        const actionBtns = document.getElementById('learn-actions');
        if (!container) return;

        const words = window._learnWords || [];
        if (words.length === 0) {
            const parts = t('learn_no_vocab').split('\n');
            container.innerHTML = `
                <div class="w-full h-full flex items-center justify-center bg-card rounded-3xl border border-subtle p-8 text-center" style="min-height:200px">
                    <p class="text-muted">${parts[0]}<br>${parts[1] ? `<strong>${parts[1]}</strong>` : ''}</p>
                </div>`;
            if (actionBtns) { actionBtns.style.opacity='0'; actionBtns.style.pointerEvents='none'; }
            return;
        }

        const word = words[currentCardIndex];
        const frontText = learnDirectionReversed ? word.back : word.front;
        const backText  = learnDirectionReversed ? word.front : word.back;
        const frontLabel = learnDirectionReversed ? t('learn_back') : t('learn_front');
        const backLabel  = learnDirectionReversed ? t('learn_front') : t('learn_back');

        const frontSize = getDynamicTextSize(frontText);
        const backSize  = getDynamicTextSize(backText);
        const frontSingleStyle = getSingleWordStyle(frontText);
        const backSingleStyle  = getSingleWordStyle(backText);

        // Wenn ein einzelnes langes Wort: nowrap + clamp-Schriftgröße, kein break-words
        const frontClasses = frontSingleStyle
            ? `font-bold leading-tight pb-1 w-full`
            : `${frontSize} font-bold whitespace-pre-wrap leading-tight pb-1 break-words hyphens-auto w-full`;
        const backClasses = backSingleStyle
            ? `font-bold leading-tight pb-1 w-full`
            : `${backSize} font-bold whitespace-pre-wrap leading-tight pb-1 break-words hyphens-auto w-full`;

        container.innerHTML = `
            <div id="flashcard" class="preserve-3d flip-transition cursor-pointer shadow-xl rounded-3xl" onclick="flipCard()" style="position:relative;width:100%;height:100%;min-height:220px">
                <div class="absolute inset-0 backface-hidden bg-card rounded-3xl border border-subtle flex flex-col justify-center items-center p-6 text-center">
                    <span class="absolute top-4 left-4 text-xs font-bold text-muted">${frontLabel}</span>
                    <div class="w-full max-h-[75%] overflow-hidden hide-scrollbar flex items-center justify-center py-2 px-4">
                        <h2 class="${frontClasses}" style="${frontSingleStyle}" lang="de">${escapeHtml(frontText)}</h2>
                    </div>
                    <p class="absolute bottom-6 text-muted text-sm"><i class="fa-solid fa-hand-pointer mr-2"></i>${t('learn_flip_hint')}</p>
                </div>
                <div class="absolute inset-0 backface-hidden rotate-y-180 accent-bg rounded-3xl flex flex-col justify-center items-center p-6 text-center text-white">
                    <span class="absolute top-4 left-4 text-xs font-bold text-white/60">${backLabel}</span>
                    <div class="w-full max-h-[85%] overflow-hidden hide-scrollbar flex items-center justify-center py-2 px-4">
                        <h2 class="${backClasses}" style="${backSingleStyle}" lang="de">${escapeHtml(backText)}</h2>
                    </div>
                </div>
            </div>`;

        const card = document.getElementById('flashcard');
        card.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, {passive:true});
        card.addEventListener('touchend',   e => { touchEndX   = e.changedTouches[0].screenX; handleSwipe(); }, {passive:true});

        isCardFlipped = false;
        if (actionBtns) { actionBtns.style.opacity='0'; actionBtns.style.pointerEvents='none'; }
    }

    function flipCard() {
        const card = document.getElementById('flashcard');
        const btns = document.getElementById('learn-actions');
        if (!card || !btns) return;
        isCardFlipped = !isCardFlipped;
        if (isCardFlipped) {
            card.classList.add('rotate-y-180');
            btns.style.opacity = '1'; btns.style.pointerEvents = 'auto';
        } else {
            card.classList.remove('rotate-y-180');
            btns.style.opacity = '0'; btns.style.pointerEvents = 'none';
        }
    }

    async function handleCardResult(type) {
        if (type === 'known') {
            incrementGoal();
            // Aus difficult_deck entfernen, falls vorhanden
            const words = window._learnWords || [];
            const word = words[currentCardIndex];
            if (word) {
                const diffDeck = decks.find(d => d.id === 'difficult_deck');
                if (diffDeck) {
                    diffDeck.words = diffDeck.words.filter(p => p.id !== word.id);
                    await saveDeck(diffDeck);
                }
            }
        } else if (type === 'repeat') {
            // Wortpaar in difficult_deck aufnehmen (kein Duplikat)
            const words = window._learnWords || [];
            const word = words[currentCardIndex];
            if (word) {
                let diffDeck = decks.find(d => d.id === 'difficult_deck');
                if (!diffDeck) {
                    diffDeck = { id: 'difficult_deck', name: '⚠️ Schwierige Wortpaare', words: [] };
                }
                const already = diffDeck.words.some(p => p.id === word.id);
                if (!already) {
                    diffDeck.words = [...diffDeck.words, { id: word.id, front: word.front, back: word.back }];
                    await saveDeck(diffDeck);
                }
            }
        }
        nextCard('left');
    }

    function nextCard(dir = 'left') {
        const words = window._learnWords || [];
        if (words.length <= 1) { renderFlashcard(); return; }
        const card = document.getElementById('flashcard');
        if (!card) return;
        card.classList.add(dir === 'left' ? 'swipe-left' : 'swipe-right');
        
        setTimeout(() => {
            if (learnMode === 'random') {
                if (remainingIndices.length === 0) initRemainingIndices();
                const randIdx = Math.floor(Math.random() * remainingIndices.length);
                currentCardIndex = remainingIndices[randIdx];
                remainingIndices.splice(randIdx, 1);
            } else {
                currentCardIndex = dir === 'left'
                    ? (currentCardIndex + 1) % words.length
                    : (currentCardIndex - 1 + words.length) % words.length;
            }
            isCardFlipped = false;
            renderFlashcard();
        }, 300);
    }

    function handleSwipe() {
        const t50 = 50;
        if (touchEndX < touchStartX - t50) nextCard('left');
        if (touchEndX > touchStartX + t50) nextCard('right');
    }

    // ══════════════════════════════════════════════
    //  Goals & Streak
    // ══════════════════════════════════════════════
    function checkStreak() {
        const today = new Date().toDateString();
        const yesterday = new Date();
        yesterday.setDate(yesterday.getDate() - 1);
        const yesterdayStr = yesterday.toDateString();

        if (appState.lastStudyDate === today) {
            // Heute schon gelernt – nichts ändern
            return;
        }

        // Neuer Tag: learnedToday zurücksetzen
        appState.learnedToday = 0;

        // Streak nullen falls gestern kein Tagesziel erreicht wurde
        // (lastGoalMetDate ist der Tag, an dem das Ziel zuletzt erreicht wurde)
        if (appState.lastGoalMetDate !== yesterdayStr) {
            // Gestern kein Ziel erreicht (oder gestern = kein Eintrag) → Streak nullen
            // Ausnahme: Streak ist 0 und noch nie gespielt → nicht anfassen
            if (appState.streak > 0) {
                appState.streak = 0;
            }
        }

        saveState();
    }

    async function incrementGoal() {
        const today = new Date().toDateString();
        appState.lastStudyDate = today;
        appState.learnedToday += 1;

        // Streak hochzählen genau wenn das Tagesziel heute zum ersten Mal erreicht wird
        if (appState.learnedToday === appState.dailyGoal) {
            // Prüfen ob Ziel heute schon gezählt wurde
            if (appState.lastGoalMetDate !== today) {
                appState.lastGoalMetDate = today;
                appState.streak += 1;
            }
        }

        await saveState();
        updateLearnCounter();
    }

    function setDailyGoal() {
        const v = prompt(t('prompt_daily_goal'), appState.dailyGoal);
        if (v && !isNaN(v)) { appState.dailyGoal = parseInt(v, 10); saveState(); updateGoalUI(); }
    }

    function updateGoalUI() {
        const el1 = document.getElementById('streak-count');
        const el2 = document.getElementById('goal-text');
        const el3 = document.getElementById('goal-progress');
        const streakDayEl = document.getElementById('streak-day-label');
        if (el1) el1.textContent = appState.streak;
        if (streakDayEl) {
            const s = appState.streak;
            if (currentLang === 'de') {
                streakDayEl.textContent = s === 1 ? 'Tag' : 'Tage';
            } else {
                streakDayEl.textContent = s === 1 ? 'day' : 'days';
            }
        }
        if (el2) el2.textContent = `${appState.learnedToday} / ${appState.dailyGoal} ${t('goals_cards_learned')}`;
        if (el3) el3.style.width = `${Math.min((appState.learnedToday / appState.dailyGoal) * 100, 100)}%`;
    }

    function escapeHtml(str) {
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }


    // ══════════════════════════════════════════════
    //  PWA Install Logic
    // ══════════════════════════════════════════════
    let deferredPrompt = null;

    // WICHTIG: Sofort lauschen, NICHT im Timeout!
    window.addEventListener('beforeinstallprompt', (e) => {
        // Standard-Mini-Infobar von Android Chrome verhindern
        e.preventDefault();
        // Event für unseren eigenen Button speichern
        deferredPrompt = e;
        // Versuchen wir direkt, unseren Android-Button zu zeigen
        showAndroidInstallBanner();
    });

    function showAndroidInstallBanner() {
        const banner = document.getElementById('install-banner');
        const androidDiv = document.getElementById('install-android');
        
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
        if (isStandalone || localStorage.getItem('pwa_banner_dismissed') === '1') return;

        if (deferredPrompt && banner && androidDiv) {
            androidDiv.classList.remove('hidden');
            banner.classList.add('visible');
        }
    }

    function initPwaInstallLogic() {
        const banner = document.getElementById('install-banner');
        const iosDiv = document.getElementById('install-ios');
        if (!banner || !iosDiv) return;

        const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
        if (isStandalone || localStorage.getItem('pwa_banner_dismissed') === '1') return;

        const ua = navigator.userAgent || '';
        const isIOS = /iPhone|iPad|iPod/i.test(ua);
        const isIOSSafari = isIOS && !/CriOS|FxiOS|OPiOS|mercury/i.test(ua);

        if (isIOSSafari) {
            // Auf iOS zeigen wir die manuelle Anleitung
            iosDiv.classList.remove('hidden');
            banner.classList.add('visible');
            return;
        }

        // Falls wir auf Android sind und das Event schon gefeuert hat:
        showAndroidInstallBanner();
    }

    async function triggerInstallPrompt() {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        deferredPrompt = null;
        if (outcome === 'accepted') {
            hidePwaInstallBanner();
        } else {
            dismissInstallBanner();
        }
    }

    function hidePwaInstallBanner() {
        const banner = document.getElementById('install-banner');
        if (banner) {
            banner.style.animation = 'none';
            banner.style.transition = 'opacity 0.25s, transform 0.25s';
            banner.style.opacity = '0';
            banner.style.transform = 'translateY(100%)';
            setTimeout(() => banner.classList.remove('visible'), 260);
        }
    }

    function dismissInstallBanner() {
        localStorage.setItem('pwa_banner_dismissed', '1');
        hidePwaInstallBanner();
    }

    document.addEventListener('DOMContentLoaded', initApp);

    window.addEventListener('DOMContentLoaded', () => {
        // iOS-Logik kann ruhig verzögert kommen, damit das Onboarding nicht zu unruhig wirkt
        setTimeout(initPwaInstallLogic, 1500);
    });

    // ══════════════════════════════════════════════
    //  Service Worker Registrierung
    // ══════════════════════════════════════════════
    if ('serviceWorker' in navigator) {
        // Wir warten, bis die Seite komplett geladen ist
        window.addEventListener('load', () => {
            // Hier den exakten Dateinamen deines Service Workers eintragen
            navigator.serviceWorker.register('./sw.js')
                .then((registration) => {
                    console.log('✅ [Service Worker] Erfolgreich registriert! Scope:', registration.scope);
                })
                .catch((error) => {
                    console.error('❌ [Service Worker] Registrierung fehlgeschlagen:', error);
                });
        });
    } else {
        console.warn('⚠️ Dieser Browser unterstützt keine Service Worker (PWA-Features).');
    }


    </script>
</body>
