<!DOCTYPE html>
<html lang="de" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flashcard-AI</title>
    
    <!-- PWA Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-touch-fullscreen" content="yes">

    <meta name="theme-color" content="#000000">

    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="brain.png">

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            // NEU: Warnung unterdrücken
            corePlugins: { preflight: true },
            theme: {
                extend: {
                    colors: {
                        slate: {
                            50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0',
                            300: '#cbd5e1', 400: '#94a3b8', 500: '#64748b',
                            600: '#475569', 700: '#334155', 800: '#1e293b',
                            850: '#172033', 900: '#000000', 950: '#020617'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* ── CSS Custom Properties for theming ── */
        :root {
            --color-primary: #6366f1;
            --color-primary-hover: #4f46e5;
            --color-primary-light: rgba(99,102,241,0.15);
            --color-primary-shadow: rgba(99,102,241,0.35);
        }
        :root[data-accent="teal"] {
            --color-primary: #14b8a6;
            --color-primary-hover: #0d9488;
            --color-primary-light: rgba(20,184,166,0.15);
            --color-primary-shadow: rgba(20,184,166,0.35);
        }
        :root[data-accent="violet"] {
            --color-primary: #8b5cf6;
            --color-primary-hover: #7c3aed;
            --color-primary-light: rgba(139,92,246,0.15);
            --color-primary-shadow: rgba(139,92,246,0.35);
        }

        /* ── Base ── */
        body { -webkit-tap-highlight-color: transparent; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* ── Card flip ── */
        .perspective { perspective: 1000px; }
        .preserve-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .flip-transition { transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1); }

        /* ── Swipe animations ── */
        .swipe-left  { animation: swipeLeftOut  0.3s forwards; }
        .swipe-right { animation: swipeRightOut 0.3s forwards; }
        @keyframes swipeLeftOut  { to { transform: translateX(-100%) rotate(-10deg); opacity: 0; } }
        @keyframes swipeRightOut { to { transform: translateX(100%)  rotate(10deg);  opacity: 0; } }

        /* ── Accent-color utilities ── */
        .accent-bg     { background-color: var(--color-primary); }
        .accent-bg-hover:hover { background-color: var(--color-primary-hover); }
        .accent-text   { color: var(--color-primary); }
        .accent-border { border-color: var(--color-primary); }
        .accent-light  { background-color: var(--color-primary-light); }
        .accent-shadow { box-shadow: 0 8px 30px var(--color-primary-shadow); }
        .accent-ring:focus { outline: 2px solid var(--color-primary); outline-offset: 2px; }
        .nav-active    { color: var(--color-primary) !important; }

        /* ── Light/Dark surface colors ── */
        .bg-surface   { background-color: #f1f5f9; }
        .dark .bg-surface { background-color: #000000; }
        .bg-card      { background-color: #ffffff; }
        .dark .bg-card { background-color: #1e293b; }
        .border-subtle { border-color: #e2e8f0; }
        .dark .border-subtle { border-color: #334155; }
        .text-base    { color: #1e293b; }
        .dark .text-base { color: #e2e8f0; }
        .text-muted   { color: #64748b; }
        .dark .text-muted { color: #94a3b8; }

        /* ── Flashcard: fill available height ── */
        #flashcard-wrapper {
            flex: 1 1 0%;
            min-height: 0;
            display: flex;
            flex-direction: column;
        }
        #flashcard-container {
            flex: 1 1 0%;
            min-height: 0;
            display: flex;
            align-items: stretch;
        }
        #flashcard-container > div {
            flex: 1 1 0%;
            min-height: 0;
        }
        #flashcard {
            width: 100%;
            height: 100%;
            min-height: 220px;
        }

        /* ── Deck list item hover ── */
        .deck-item { transition: transform 0.15s, box-shadow 0.15s; }
        .deck-item:active { transform: scale(0.98); }

        /* ── Modal overlay ── */
        .modal-overlay {
            position: fixed; inset: 0; z-index: 60;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(4px);
            display: flex; align-items: flex-end; justify-content: center;
        }
        .modal-sheet {
            width: 100%; max-width: 480px;
            border-radius: 1.5rem 1.5rem 0 0;
            padding: 1.5rem 1.5rem 2.5rem;
            animation: slideUp 0.28s cubic-bezier(0.32,0.72,0,1);
        }
        .dark .modal-sheet { background: #1e293b; }
        .modal-sheet { background: #fff; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        /* ── Accent picker circle ── */
        .accent-dot {
            width: 2rem; height: 2rem;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: transform 0.15s, border-color 0.15s;
        }
        .accent-dot:hover { transform: scale(1.1); }
        .accent-dot.selected { border-color: white; box-shadow: 0 0 0 2px var(--color-primary); }

        /* ── Deck detail back button ── */
        .back-btn { cursor: pointer; }

        /* ── Language picker buttons on Onboarding ── */
        .lang-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            width: 100%;
            max-width: 24rem;
            padding: 0.9rem 1.5rem;
            border-radius: 1rem;
            font-size: 1rem;
            font-weight: 600;
            border: 2px solid transparent;
            transition: transform 0.15s, background 0.15s, border-color 0.15s;
            cursor: pointer;
        }
        .lang-btn:active { transform: scale(0.97); }
        .lang-btn.lang-de {
            background: var(--color-primary-light);
            color: var(--color-primary);
            border-color: var(--color-primary);
        }
        .lang-btn.lang-en {
            background: transparent;
            color: #64748b;
            border-color: #cbd5e1;
        }
        .dark .lang-btn.lang-en { color: #94a3b8; border-color: #334155; }
        .lang-btn.lang-selected {
            background: var(--color-primary);
            color: #fff;
            border-color: var(--color-primary);
        }

        /* ── Language toggle in Settings ── */
        .lang-toggle-btn {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.8rem;
            font-weight: 600;
            padding: 0.3rem 0.75rem;
            border-radius: 0.6rem;
            border: 1.5px solid var(--color-primary);
            color: var(--color-primary);
            background: transparent;
            cursor: pointer;
            transition: background 0.15s;
        }
        .lang-toggle-btn:hover { background: var(--color-primary-light); }
    </style>
</head>

<body class="bg-surface text-base transition-colors duration-300 h-screen w-screen overflow-hidden flex flex-col font-sans">

    <!-- Hidden file input for backup import -->
    <input type="file" id="backup-input" class="hidden" accept=".json" onchange="importData(event)">

    <!-- ═══ HEADER ═══ -->
    <header id="main-header" class="hidden flex-shrink-0 flex justify-between items-center px-5 py-3 z-10 bg-surface border-b border-subtle">
        <div class="flex items-center gap-2">
            <button id="header-back-btn" class="back-btn hidden accent-text mr-1" onclick="handleBackBtn()">
                <i class="fa-solid fa-chevron-left text-lg"></i>
            </button>
            <h1 class="text-lg font-bold tracking-tight" id="header-title">Flashcard-AI</h1>
        </div>
        <div class="flex gap-3 items-center">
            <button onclick="triggerImport()" class="text-muted hover:accent-text transition" data-i18n-title="import_title">
                <i class="fa-solid fa-upload text-lg"></i>
            </button>
            <button onclick="downloadData()" class="text-muted hover:accent-text transition" data-i18n-title="export_title">
                <i class="fa-solid fa-download text-lg"></i>
            </button>
            <button onclick="openSettingsModal()" class="text-muted hover:accent-text transition" data-i18n-title="settings_title">
                <i class="fa-solid fa-sliders text-lg"></i>
            </button>
        </div>
    </header>

    <!-- ═══ MAIN ═══ -->
    <main class="flex-1 overflow-y-auto hide-scrollbar relative z-0" id="main-container">

        <!-- ─── View: Onboarding ─── -->
        <section id="view-onboarding" class="absolute inset-0 flex flex-col justify-center items-center p-8 bg-surface z-50">
            <div class="absolute top-4 right-5 flex gap-3 items-center">
                <!-- Accent picker on onboarding -->
                <div class="flex gap-2 items-center">
                    <button class="accent-dot" data-accent="indigo" style="background:#6366f1" onclick="setAccent('indigo')" title="Indigo"></button>
                    <button class="accent-dot" data-accent="teal"   style="background:#14b8a6" onclick="setAccent('teal')"   title="Teal"></button>
                    <button class="accent-dot" data-accent="violet" style="background:#8b5cf6" onclick="setAccent('violet')" title="Violet"></button>
                </div>
                <button onclick="toggleTheme()" class="text-muted hover:accent-text transition ml-1">
                    <i class="fa-solid fa-moon text-xl" id="theme-icon-onboarding"></i>
                </button>
            </div>

            <div class="w-20 h-20 accent-bg rounded-3xl flex items-center justify-center mb-6 accent-shadow">
                <i class="fa-solid fa-brain text-white text-4xl"></i>
            </div>

            <!-- Language picker: shown at the top of onboarding -->
            <div class="flex gap-3 mb-7 w-full max-w-sm">
                <button id="lang-btn-de" class="lang-btn lang-de flex-1" onclick="setLanguage('de')">🇩🇪 Deutsch</button>
                <button id="lang-btn-en" class="lang-btn lang-en flex-1" onclick="setLanguage('en')">🇺🇸 English</button>
            </div>

            <h2 class="text-3xl font-bold mb-3 text-center" data-i18n="onboarding_title"></h2>
            <p class="text-sm text-muted text-center mb-8 max-w-xs" data-i18n="onboarding_subtitle"></p>

            <div class="space-y-5 w-full max-w-sm">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-full accent-light accent-text flex justify-center items-center font-bold flex-shrink-0">1</div>
                    <p class="text-sm" data-i18n="onboarding_step1"></p>
                </div>
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-full accent-light accent-text flex justify-center items-center font-bold flex-shrink-0">2</div>
                    <p class="text-sm" data-i18n="onboarding_step2"></p>
                </div>
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-full accent-light accent-text flex justify-center items-center font-bold flex-shrink-0">3</div>
                    <p class="text-sm" data-i18n="onboarding_step3"></p>
                </div>
            </div>

            <button onclick="finishOnboarding()" class="mt-10 w-full max-w-sm accent-bg accent-bg-hover text-white py-4 rounded-2xl font-bold accent-shadow transition-colors active:scale-95" data-i18n="onboarding_cta"></button>
        </section>

        <!-- ─── View: Scan ─── -->
        <section id="view-scan" class="view hidden flex flex-col px-5 pt-4 pb-4 min-h-full">
            <!-- Backup warning -->
            <div id="backup-warning" class="w-full mb-4 bg-amber-500/10 border border-amber-500/30 text-amber-600 dark:text-amber-400 rounded-2xl p-3 text-xs flex justify-between items-center hidden">
                <span><i class="fa-solid fa-triangle-exclamation mr-2"></i><span data-i18n="backup_warning"></span></span>
                <button onclick="downloadData()" class="underline font-bold ml-2 whitespace-nowrap" data-i18n="backup_save"></button>
            </div>

            <!-- Target deck selector -->
            <div class="mb-4">
                <label class="text-xs font-semibold text-muted uppercase tracking-wider mb-1 block" data-i18n="scan_deck_label"></label>
                <select id="scan-target-deck" class="w-full bg-card border border-subtle rounded-xl px-4 py-3 text-sm font-medium accent-ring focus:outline-none dark:bg-slate-800">
                </select>
            </div>

            <input type="file" id="scan-file-input" class="hidden"
                   accept="image/*" capture="environment"
                   onchange="handleImageSelected(event)">

            <div class="flex-1 flex flex-col justify-center items-center">
                <div id="scan-preview-area"
                     class="w-full aspect-square max-h-64 rounded-3xl border-2 border-dashed border-subtle flex flex-col items-center justify-center p-6 text-center mb-6 relative overflow-hidden bg-card shadow-sm cursor-pointer active:scale-98 transition-transform"
                     onclick="document.getElementById('scan-file-input').click()">
                    <div id="scan-placeholder" class="flex flex-col items-center">
                        <i class="fa-solid fa-camera text-5xl text-muted mb-4"></i>
                        <p class="text-sm text-muted font-medium" data-i18n="scan_placeholder_main"></p>
                        <p class="text-xs text-muted mt-1 opacity-60" data-i18n="scan_placeholder_sub"></p>
                    </div>
                    <img id="scan-preview-img" src="" alt="Preview"
                         class="hidden absolute inset-0 w-full h-full object-contain rounded-3xl">
                    <div id="scan-loader" class="absolute inset-0 bg-white/90 dark:bg-slate-800/90 flex flex-col items-center justify-center hidden backdrop-blur-sm rounded-3xl">
                        <i class="fa-solid fa-circle-notch fa-spin accent-text text-4xl mb-4"></i>
                        <p class="text-sm font-medium animate-pulse" id="scan-loader-text" data-i18n="scan_loader_analyzing"></p>
                    </div>
                </div>

                <div id="scan-error" class="hidden w-full mb-4 bg-red-500/10 border border-red-400/40 text-red-500 dark:text-red-400 rounded-2xl p-3 text-xs flex items-start gap-2">
                    <i class="fa-solid fa-circle-exclamation mt-0.5 flex-shrink-0"></i>
                    <span id="scan-error-text"></span>
                </div>

                <div class="w-full flex flex-col gap-3">
                    <button onclick="document.getElementById('scan-file-input').click()"
                            class="w-full border accent-border accent-text py-3 rounded-2xl font-semibold hover:accent-light transition flex justify-center items-center gap-2 active:scale-95">
                        <i class="fa-solid fa-image"></i> <span data-i18n="scan_step1_btn"></span>
                    </button>
                    <button id="scan-btn" onclick="startAIScan()" disabled
                            class="w-full accent-bg accent-bg-hover text-white py-4 rounded-2xl font-bold accent-shadow transition-colors active:scale-95 flex justify-center items-center gap-2 disabled:opacity-40 disabled:cursor-not-allowed disabled:active:scale-100">
                        <i class="fa-solid fa-wand-magic-sparkles"></i> <span data-i18n="scan_step2_btn"></span>
                    </button>
                </div>
            </div>
        </section>

        <!-- ─── View: Lernen / Learn ─── -->
        <section id="view-learn" class="view hidden flex flex-col px-5 pt-3 pb-4" style="height:100%">
            <div id="learn-deck-selector" class="hidden flex flex-col items-center justify-center h-full py-8">
                <div class="w-16 h-16 accent-bg rounded-2xl flex items-center justify-center mb-6 accent-shadow">
                    <i class="fa-solid fa-layer-group text-white text-2xl"></i>
                </div>
                <h3 class="text-xl font-bold mb-2" data-i18n="learn_pick_title"></h3>
                <p class="text-sm text-muted mb-6 text-center" data-i18n="learn_pick_subtitle"></p>
                <div id="learn-deck-list" class="w-full max-w-sm space-y-3"></div>
            </div>

            <div id="learn-session" class="hidden flex flex-col h-full">
                <div class="flex justify-between items-center mb-4 flex-shrink-0">
                    <button onclick="exitLearnSession()" class="text-muted hover:accent-text transition flex items-center gap-1 text-sm">
                        <i class="fa-solid fa-chevron-left"></i> <span id="learn-deck-name-label" class="font-medium"></span>
                    </button>
                    <span id="learn-counter" class="text-sm font-bold accent-light accent-text py-1 px-3 rounded-full">0 / 20</span>
                </div>

                <div id="flashcard-wrapper">
                    <div class="perspective w-full max-w-md mx-auto" id="flashcard-container"></div>
                </div>

                <div id="learn-actions" class="mt-4 flex justify-between gap-4 max-w-md mx-auto w-full flex-shrink-0 opacity-0 pointer-events-none transition-opacity duration-300">
                    <button onclick="handleCardResult('repeat')" class="flex-1 bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400 py-4 rounded-2xl font-bold active:scale-95 transition">
                        <i class="fa-solid fa-xmark mb-1 block text-xl"></i> <span data-i18n="learn_repeat"></span>
                    </button>
                    <button onclick="handleCardResult('known')" class="flex-1 bg-green-100 dark:bg-green-900/30 text-green-600 dark:text-green-400 py-4 rounded-2xl font-bold active:scale-95 transition">
                        <i class="fa-solid fa-check mb-1 block text-xl"></i> <span data-i18n="learn_known"></span>
                    </button>
                </div>
            </div>
        </section>

        <!-- ─── View: Liste / Lists ─── -->
        <section id="view-list" class="view hidden px-5 pt-4 pb-6 min-h-full">
            <button onclick="createNewDeck()" class="w-full border accent-border accent-text py-3 rounded-xl font-semibold mb-5 hover:accent-light transition flex items-center justify-center gap-2">
                <i class="fa-solid fa-plus"></i> <span data-i18n="list_new_btn"></span>
            </button>
            <div id="deck-overview" class="space-y-3"></div>
        </section>

        <!-- ─── View: Deck Detail ─── -->
        <section id="view-deck-detail" class="view hidden px-5 pt-4 pb-6 min-h-full">
            <div class="flex justify-between items-center mb-4">
                <h2 id="deck-detail-title" class="text-lg font-bold"></h2>
                <span id="deck-detail-count" class="text-xs text-muted"></span>
            </div>
            <button onclick="addManualVocab()" class="w-full border accent-border accent-text py-3 rounded-xl font-semibold mb-4 hover:accent-light transition flex items-center justify-center gap-2">
                <i class="fa-solid fa-plus"></i> <span data-i18n="detail_add_manual"></span>
            </button>
            <div id="vocab-list" class="space-y-3 pb-4"></div>
        </section>

        <!-- ─── View: Ziele / Goals ─── -->
        <section id="view-goals" class="view hidden px-5 pt-4 pb-6 min-h-full">
            <div class="bg-card p-6 rounded-3xl shadow-sm mb-5 flex flex-col items-center justify-center border border-subtle">
                <div class="text-6xl mb-2">🔥</div>
                <h3 class="text-3xl font-bold"><span id="streak-count">0</span> <span data-i18n="goals_days"></span></h3>
                <p class="text-sm text-muted mt-1" data-i18n="goals_streak_label"></p>
            </div>
            <div class="bg-card p-6 rounded-3xl shadow-sm border border-subtle">
                <div class="flex justify-between items-end mb-4">
                    <div>
                        <h3 class="text-lg font-bold" data-i18n="goals_daily_title"></h3>
                        <p class="text-xs text-muted" id="goal-text"></p>
                    </div>
                    <button onclick="setDailyGoal()" class="accent-text text-sm"><i class="fa-solid fa-pen"></i> <span data-i18n="goals_change"></span></button>
                </div>
                <div class="w-full bg-slate-200 dark:bg-slate-700 rounded-full h-3 mb-2">
                    <div id="goal-progress" class="accent-bg h-3 rounded-full transition-all duration-500" style="width:0%"></div>
                </div>
            </div>
        </section>

    </main><!-- end main -->

    <!-- ═══ BOTTOM NAV ═══ -->
    <nav id="bottom-nav" class="hidden flex-shrink-0 bg-surface border-t border-subtle px-6 pt-2 pb-safe z-20">
        <ul class="flex justify-between items-center pb-3 pt-1">
            <li>
                <button onclick="switchView('scan')" id="nav-scan" class="nav-btn flex flex-col items-center p-2 text-muted hover:accent-text transition">
                    <i class="fa-solid fa-camera text-xl mb-1"></i>
                    <span class="text-[10px] font-medium" data-i18n="nav_scan"></span>
                </button>
            </li>
            <li>
                <button onclick="switchView('learn')" id="nav-learn" class="nav-btn flex flex-col items-center p-2 text-muted hover:accent-text transition">
                    <i class="fa-solid fa-layer-group text-xl mb-1"></i>
                    <span class="text-[10px] font-medium" data-i18n="nav_learn"></span>
                </button>
            </li>
            <li>
                <button onclick="switchView('list')" id="nav-list" class="nav-btn flex flex-col items-center p-2 text-muted hover:accent-text transition">
                    <i class="fa-solid fa-list-ul text-xl mb-1"></i>
                    <span class="text-[10px] font-medium" data-i18n="nav_list"></span>
                </button>
            </li>
            <li>
                <button onclick="switchView('goals')" id="nav-goals" class="nav-btn flex flex-col items-center p-2 text-muted hover:accent-text transition">
                    <i class="fa-solid fa-bullseye text-xl mb-1"></i>
                    <span class="text-[10px] font-medium" data-i18n="nav_goals"></span>
                </button>
            </li>
        </ul>
    </nav>

    <!-- ═══ SETTINGS MODAL ═══ -->
    <div id="settings-modal" class="modal-overlay hidden" onclick="closeSettingsOnBackdrop(event)">
        <div class="modal-sheet">
            <div class="flex justify-between items-center mb-5">
                <h3 class="text-lg font-bold" data-i18n="settings_title_modal"></h3>
                <button onclick="closeSettingsModal()" class="text-muted hover:accent-text text-xl"><i class="fa-solid fa-xmark"></i></button>
            </div>

            <!-- Theme toggle -->
            <div class="flex justify-between items-center py-3 border-b border-subtle">
                <span class="font-medium text-sm" data-i18n="settings_appearance"></span>
                <button onclick="toggleTheme()" id="theme-toggle-btn" class="flex items-center gap-2 text-sm accent-text font-semibold">
                    <i class="fa-solid fa-moon" id="theme-icon"></i>
                    <span id="theme-label"></span>
                </button>
            </div>

            <!-- Accent color -->
            <div class="py-4 border-b border-subtle">
                <p class="font-medium text-sm mb-3" data-i18n="settings_accent"></p>
                <div class="flex gap-4 items-center">
                    <div class="flex flex-col items-center gap-1">
                        <button class="accent-dot" data-accent="indigo" style="background:#6366f1" onclick="setAccent('indigo')"></button>
                        <span class="text-xs text-muted">Indigo</span>
                    </div>
                    <div class="flex flex-col items-center gap-1">
                        <button class="accent-dot" data-accent="teal" style="background:#14b8a6" onclick="setAccent('teal')"></button>
                        <span class="text-xs text-muted">Teal</span>
                    </div>

    /**
     * setLanguage(lang)
     * 1. Stores the choice in localStorage
     * 2. Updates all [data-i18n] elements in the DOM
     * 3. Updates all [data-i18n-title] elements (title attributes)
     * 4. Sets the <html lang="…"> attribute
     * 5. Refreshes dynamic UI that was rendered with hardcoded strings
     */
    function setLanguage(lang) {
        if (lang !== 'de' && lang !== 'en') return;
        currentLang = lang;
        localStorage.setItem('language', lang);
        document.documentElement.lang = lang;

        // Update all static [data-i18n] elements
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.dataset.i18n;
            const val = t(key);
            if (typeof val === 'string') el.textContent = val;
        });

        // Update title attributes for icon buttons
        document.querySelectorAll('[data-i18n-title]').forEach(el => {
            const key = el.dataset.i18nTitle;
            const val = t(key);
            if (typeof val === 'string') el.title = val;
        });

        // Highlight active language buttons
        _updateLangButtons(lang);

        // Re-render dynamic parts that contain translated strings
        applyTheme();          // re-renders theme label
        updateGoalUI();        // re-renders "X / Y Karten gelernt"

        // Re-render views that inject translated strings dynamically

            btn.classList.toggle('lang-en', l === 'en' && l !== lang);
        });

        const settDe = document.getElementById('settings-lang-de');
        const settEn = document.getElementById('settings-lang-en');

        if (settEn) settEn.style.opacity = lang === 'en' ? '1' : '0.45';
    }

    /** Called once at startup: detect saved/system language */
    function initLanguage() {
        const saved = localStorage.getItem('language');
        if (saved === 'de' || saved === 'en') {
            currentLang = saved;
        } else {
            // Detect from browser
            const browserLang = navigator.language || navigator.userLanguage || '';
            currentLang = browserLang.toLowerCase().startsWith('de') ? 'de' : 'en';
        }
        setLanguage(currentLang);
    }

    // ══════════════════════════════════════════════
    //  IndexedDB Layer
    // ══════════════════════════════════════════════
    const DB_NAME    = 'VocabAI';
    const DB_VERSION = 1;
    const STORE_META  = 'meta';
    const STORE_DECKS = 'decks';

    let db = null;

    function openDB() {
        return new Promise((resolve, reject) => {
            const req = indexedDB.open(DB_NAME, DB_VERSION);
            req.onupgradeneeded = e => {
                const d = e.target.result;
                if (!d.objectStoreNames.contains(STORE_META))
                    d.createObjectStore(STORE_META);
                if (!d.objectStoreNames.contains(STORE_DECKS))
                    d.createObjectStore(STORE_DECKS, { keyPath: 'id' });
            };
            req.onsuccess = e => { db = e.target.result; resolve(db); };
            req.onerror   = e => reject(e.target.error);
        });
    }

    function dbGet(store, key) {
        return new Promise((resolve, reject) => {
            const tx  = db.transaction(store, 'readonly');
            const req = tx.objectStore(store).get(key);
            req.onsuccess = () => resolve(req.result);
            req.onerror   = e => reject(e.target.error);
        });
    }

    function dbPut(store, value, key) {
        return new Promise((resolve, reject) => {
            const tx  = db.transaction(store, 'readwrite');
            const req = key !== undefined
                ? tx.objectStore(store).put(value, key)
                : tx.objectStore(store).put(value);
            req.onsuccess = () => resolve();
            req.onerror   = e => reject(e.target.error);
        });
    }

    function dbDelete(store, key) {
        return new Promise((resolve, reject) => {
            const tx  = db.transaction(store, 'readwrite');
            const req = tx.objectStore(store).delete(key);
            req.onsuccess = () => resolve();
            req.onerror   = e => reject(e.target.error);
        });
    }

    function dbGetAll(store) {
        return new Promise((resolve, reject) => {
            const tx  = db.transaction(store, 'readonly');
            const req = tx.objectStore(store).getAll();
            req.onsuccess = () => resolve(req.result);
            req.onerror   = e => reject(e.target.error);
        });
    }

        initLanguage();          // ← i18n first (before any rendered text)
        await openDB();

        applyTheme();

    // ══════════════════════════════════════════════
    //  Persistence
    // ══════════════════════════════════════════════
    async function loadState() {
        const saved = await dbGet(STORE_META, 'appState');
        if (saved) appState = { ...appState, ...saved };
    }

    async function saveState() {
        await dbPut(STORE_META, appState, 'appState');
        updateGoalUI();
        checkBackupStatus();
    }

    async function loadDecks() {
        decks = await dbGetAll(STORE_DECKS);
        decks.sort((a, b) => a.id - b.id);
        if (decks.length === 0) {
            const defName = currentLang === 'de' ? 'Standard-Liste' : 'Default List';
            const def = { id: Date.now(), name: defName, words: [] };
            await dbPut(STORE_DECKS, def);
            decks = [def];
        }
    }

    async function saveDeck(deck) {
        await dbPut(STORE_DECKS, deck);
        const idx = decks.findIndex(d => d.id === deck.id);
        if (idx >= 0) decks[idx] = deck; else decks.push(deck);
    }

    async function deleteDeck(deckId) {
        await dbDelete(STORE_DECKS, deckId);
        decks = decks.filter(d => d.id !== deckId);
    }

    function totalWordCount() {
        return decks.reduce((s, d) => s + d.words.length, 0);
    }

            if (label) label.textContent = t('settings_theme_light');
        }
    }

    // ══════════════════════════════════════════════
    //  Navigation
    // ══════════════════════════════════════════════
    function switchView(viewName) {
        document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));

        const target = viewName === 'deck-detail' ? 'list' : viewName;
        const viewEl = document.getElementById(`view-${viewName}`);
        if (viewEl) viewEl.classList.remove('hidden');

        const activeBtn = document.getElementById(`nav-${target}`);
        if (activeBtn) activeBtn.classList.add('nav-active');

        const titleKeys = {
            'scan':        'view_title_scan',
            'learn':       'view_title_learn',
            'list':        'view_title_list',
            'deck-detail': 'view_title_deck_detail',
            'goals':       'view_title_goals'
        };
        document.getElementById('header-title').textContent = t(titleKeys[viewName] || 'view_title_scan');

        const backBtn = document.getElementById('header-back-btn');
        backBtn.classList.toggle('hidden', viewName !== 'deck-detail');

        if (viewName === 'list')        renderDeckOverview();
        if (viewName === 'goals')       updateGoalUI();
        if (viewName === 'learn')       initLearnView();
        if (viewName === 'scan')        populateScanDeckSelector();
        if (viewName === 'deck-detail') renderDeckDetail();
    }

    // ══════════════════════════════════════════════
    //  Backup
    // ══════════════════════════════════════════════
    function triggerImport() { document.getElementById('backup-input').click(); }

    function importData(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async function(e) {
            try {
                const data = JSON.parse(e.target.result);
                if (Array.isArray(data) && data.length > 0 && data[0].words !== undefined) {
                    let imported = 0;
                    for (const deck of data) {
                        const existing = decks.find(d => d.id === deck.id);
                        if (!existing) { await saveDeck(deck); imported += deck.words.length; }
                    }
                    appState.lastBackupWordCount = totalWordCount();
                    await saveState();
                    alert(t('alert_import_success')(imported));
                } else if (Array.isArray(data) && data[0]?.en) {
                    const target = decks[0];
                    const existingWords = new Set(target.words.map(w => w.en.toLowerCase()));
                    const newWords = data
                        .filter(w => w.en && w.de && !existingWords.has(w.en.toLowerCase()))
                        .map(w => ({ id: Date.now() + Math.random(), en: w.en, de: w.de }));
                    target.words = [...newWords, ...target.words];
                    await saveDeck(target);
                    appState.lastBackupWordCount = totalWordCount();
                    await saveState();
                    alert(t('alert_import_legacy')(newWords.length, target.name));
                } else {
                    alert(t('alert_import_unknown'));
                    return;
                }
                const onboarded = await dbGet(STORE_META, 'onboarded');
                if (onboarded) switchView('list'); else finishOnboarding();
            } catch (err) {
                alert(t('alert_import_error'));
            }
        };
        reader.readAsText(file);
        event.target.value = '';
    }

    async function downloadData() {
        if (totalWordCount() === 0) { alert(t('alert_no_vocab_export')); return; }
        const dataStr = 'data:text/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(decks, null, 2));
        const a = document.createElement('a');
        a.href = dataStr;
        a.download = `vocab_backup_${new Date().toISOString().slice(0,10)}.json`;
        document.body.appendChild(a); a.click(); a.remove();
        appState.lastBackupWordCount = totalWordCount();
        await saveState();
    }

    function checkBackupStatus() {
        const box = document.getElementById('backup-warning');
        if (!box) return;
        const diff = totalWordCount() - (appState.lastBackupWordCount || 0);
        box.classList.toggle('hidden', diff <= 10);
    }

    // ══════════════════════════════════════════════
    //  Scan View
    // ══════════════════════════════════════════════
    function populateScanDeckSelector() {
        const sel = document.getElementById('scan-target-deck');
        if (!sel) return;
        sel.innerHTML = decks.map(d =>
            `<option value="${d.id}">${d.name} (${d.words.length} ${t('deck_words_suffix')})</option>`
        ).join('');
    }

    let _scanImageBase64 = null;

    function handleImageSelected(event) {
        const file = event.target.files[0];
        if (!file) return;
        setScanError('');
        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                const MAX_WIDTH = 1000;
                let w = img.width, h = img.height;
                if (w > MAX_WIDTH) { h = Math.round((h * MAX_WIDTH) / w); w = MAX_WIDTH; }
                const canvas = document.createElement('canvas');
                canvas.width = w; canvas.height = h;
                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                _scanImageBase64 = canvas.toDataURL('image/jpeg', 0.85);

                const previewImg  = document.getElementById('scan-preview-img');
                const placeholder = document.getElementById('scan-placeholder');
                previewImg.src = _scanImageBase64;
                previewImg.classList.remove('hidden');
                placeholder.classList.add('hidden');
                document.getElementById('scan-btn').disabled = false;
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
        event.target.value = '';
    }

    function setScanError(msg) {
        const box  = document.getElementById('scan-error');
        const text = document.getElementById('scan-error-text');
        if (!box || !text) return;
        if (msg) { text.textContent = msg; box.classList.remove('hidden'); }
        else      { box.classList.add('hidden'); text.textContent = ''; }
    }

    async function startAIScan() {
        if (!_scanImageBase64) { setScanError(t('scan_no_image')); return; }

        const loader     = document.getElementById('scan-loader');
        const loaderText = document.getElementById('scan-loader-text');
        const scanBtn    = document.getElementById('scan-btn');

        setScanError('');
        loader.classList.remove('hidden');
        if (loaderText) loaderText.textContent = t('scan_loader_uploading');
        scanBtn.disabled = true;

        try {
            if (loaderText) loaderText.textContent = t('scan_loader_ai');

            const response = await fetch('/api/scan', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image: _scanImageBase64 }),
            });

            const data = await response.json();
            if (!response.ok) throw new Error(data.error || `HTTP ${response.status}`);

            const pairs = data.pairs;
            if (!Array.isArray(pairs) || pairs.length === 0) throw new Error(t('scan_no_vocab'));

            const sel    = document.getElementById('scan-target-deck');
            const deckId = sel ? parseInt(sel.value) : decks[0].id;
            const deck   = decks.find(d => d.id === deckId) || decks[0];

            const newWords = pairs.map((p, i) => ({
                id: Date.now() + i,
                en: (p.front || '').trim(),
                de: (p.back  || '').trim(),
            })).filter(w => w.en && w.de);

            deck.words = [...deck.words, ...newWords];
            await saveDeck(deck);
            await saveState();

            loader.classList.add('hidden');
            _scanImageBase64 = null;
            const previewImg  = document.getElementById('scan-preview-img');
            const placeholder = document.getElementById('scan-placeholder');
            if (previewImg)  { previewImg.src = ''; previewImg.classList.add('hidden'); }
            if (placeholder) { placeholder.classList.remove('hidden'); }
            scanBtn.disabled = true;

            currentDetailDeckId = deck.id;
            switchView('deck-detail');

        } catch (err) {
            console.error('AI scan error:', err);
            loader.classList.add('hidden');
            scanBtn.disabled = false;
            setScanError(err.message || t('scan_no_vocab'));
        }
    }

    // ══════════════════════════════════════════════
    //  List View – Deck Overview
    // ══════════════════════════════════════════════
    function renderDeckOverview() {
        const container = document.getElementById('deck-overview');
        if (!container) return;
        container.innerHTML = '';

        if (decks.length === 0) {
            container.innerHTML = `<p class="text-center text-muted mt-10 text-sm">${t('list_empty')}</p>`;
            return;
        }

        decks.forEach(deck => {
            const wSuffix = deck.words.length === 1
                ? t('detail_vocab_count_singular')
                : t('detail_vocab_count_plural');
            const item = document.createElement('div');
            item.className = 'deck-item bg-card border border-subtle rounded-2xl p-4 flex justify-between items-center cursor-pointer';
            item.innerHTML = `
                <div onclick="openDeckDetail(${deck.id})" class="flex-1 min-w-0">
                    <p class="font-bold text-base truncate">${escapeHtml(deck.name)}</p>
                    <p class="text-muted text-xs mt-1">${deck.words.length} ${wSuffix}</p>
                </div>
                <div class="flex gap-3 items-center ml-3 flex-shrink-0">
                    <button onclick="event.stopPropagation(); openDeckDetail(${deck.id})" class="accent-text text-sm">
                        <i class="fa-solid fa-chevron-right"></i>
                    </button>
                    <button onclick="event.stopPropagation(); renameDeck(${deck.id})" class="text-muted hover:accent-text transition text-sm">
                        <i class="fa-solid fa-pen"></i>
                    </button>
                    <button onclick="event.stopPropagation(); confirmDeleteDeck(${deck.id})" class="text-muted hover:text-red-500 transition text-sm">
                        <i class="fa-solid fa-trash"></i>
                    </button>
                </div>
            `;
            container.appendChild(item);
        });
    }

    async function createNewDeck() {
        const name = prompt(t('prompt_new_deck'));
        if (!name || !name.trim()) return;
        const deck = { id: Date.now(), name: name.trim(), words: [] };
        await saveDeck(deck);
        renderDeckOverview();
        populateScanDeckSelector();
    }

    async function renameDeck(deckId) {
        const deck = decks.find(d => d.id === deckId);
        if (!deck) return;
        const name = prompt(t('prompt_rename_deck'), deck.name);
        if (!name || !name.trim()) return;
        deck.name = name.trim();
        await saveDeck(deck);
        renderDeckOverview();
        populateScanDeckSelector();
    }

    async function confirmDeleteDeck(deckId) {
        const deck = decks.find(d => d.id === deckId);
        if (!deck) return;
        if (decks.length === 1) { alert(t('alert_last_deck')); return; }
        if (!confirm(t('confirm_delete_deck')(deck.name, deck.words.length))) return;
        await deleteDeck(deckId);
        renderDeckOverview();
        populateScanDeckSelector();
    }

    function openDeckDetail(deckId) {
        currentDetailDeckId = deckId;
        switchView('deck-detail');
    }

    // ══════════════════════════════════════════════
    //  Deck Detail View
    // ══════════════════════════════════════════════
    function renderDeckDetail() {
        const deck = decks.find(d => d.id === currentDetailDeckId);
        if (!deck) { switchView('list'); return; }

        const wSuffix = deck.words.length === 1
            ? t('detail_vocab_count_singular')
            : t('detail_vocab_count_plural');
        document.getElementById('deck-detail-title').textContent = deck.name;
        document.getElementById('deck-detail-count').textContent = `${deck.words.length} ${wSuffix}`;

        const container = document.getElementById('vocab-list');
        container.innerHTML = '';

        if (deck.words.length === 0) {
            container.innerHTML = `<p class="text-center text-muted mt-8 text-sm">${t('detail_empty')}</p>`;
            return;
        }

        deck.words.forEach((w, idx) => {
            const item = document.createElement('div');
            item.className = 'bg-card p-4 rounded-2xl border border-subtle flex justify-between items-center';
            item.innerHTML = `
                <div class="min-w-0 flex-1">
                    <p class="font-bold">${escapeHtml(w.en)}</p>
                    <p class="text-muted text-sm mt-0.5">${escapeHtml(w.de)}</p>
                </div>
                <div class="flex gap-3 ml-3 flex-shrink-0">
                    <button onclick="editVocab(${idx})" class="text-muted hover:accent-text transition"><i class="fa-solid fa-pen text-sm"></i></button>
                    <button onclick="deleteVocab(${idx})" class="text-muted hover:text-red-500 transition"><i class="fa-solid fa-trash text-sm"></i></button>
                </div>
            `;
            container.appendChild(item);
        });
    }

    async function addManualVocab() {
        const deck = decks.find(d => d.id === currentDetailDeckId);
        if (!deck) return;
        const en = prompt(t('prompt_vocab_front'));
        if (!en) return;
        const de = prompt(t('prompt_vocab_back'));
        if (!de) return;
        deck.words.unshift({ id: Date.now(), en: en.trim(), de: de.trim() });
        await saveDeck(deck);
        renderDeckDetail();
    }

    async function editVocab(idx) {
        const deck = decks.find(d => d.id === currentDetailDeckId);
        if (!deck) return;
        const w  = deck.words[idx];
        const en = prompt(t('prompt_vocab_front_edit'), w.en);
        if (en === null) return;
        const de = prompt(t('prompt_vocab_back_edit'), w.de);
        if (de === null) return;
        deck.words[idx] = { ...w, en: en.trim(), de: de.trim() };
        await saveDeck(deck);
        renderDeckDetail();
    }

    async function deleteVocab(idx) {
        const deck = decks.find(d => d.id === currentDetailDeckId);
        if (!deck) return;
        if (!confirm(t('confirm_delete_vocab'))) return;
        deck.words.splice(idx, 1);
        await saveDeck(deck);
        renderDeckDetail();
    }

    // ══════════════════════════════════════════════
    //  Learn View
    // ══════════════════════════════════════════════
    function initLearnView() {
        const selector = document.getElementById('learn-deck-selector');
        const session  = document.getElementById('learn-session');

        const decksWithWords = decks.filter(d => d.words.length > 0);
        if (
            decksWithWords.length === 1 ||
            (appState.lastLearnDeckId && decks.find(d => d.id === appState.lastLearnDeckId && d.words.length > 0))
        ) {
            const autoId = (appState.lastLearnDeckId && decks.find(d => d.id === appState.lastLearnDeckId && d.words.length > 0))
                ? appState.lastLearnDeckId
                : decksWithWords[0]?.id;
            if (autoId) { startLearnSession(autoId); return; }
        }

        selector.classList.remove('hidden');
        session.classList.add('hidden');

        const list = document.getElementById('learn-deck-list');
        list.innerHTML = '';

        if (decksWithWords.length === 0) {
            list.innerHTML = `<p class="text-center text-muted text-sm">${t('learn_no_vocab_empty')}</p>`;
            return;
        }

        if (decksWithWords.length > 1) {
            const allBtn = document.createElement('button');
            allBtn.className = 'w-full bg-card border border-subtle rounded-2xl p-4 flex justify-between items-center accent-text font-bold text-sm';
            const total = decksWithWords.reduce((s, d) => s + d.words.length, 0);
            allBtn.innerHTML = `<span>${t('learn_all_lists')}</span><span class="text-muted font-normal">${total} ${t('learn_words_suffix')}</span>`;
            allBtn.onclick = () => startLearnSession('all');
            list.appendChild(allBtn);
        }

        decksWithWords.forEach(d => {
            const btn = document.createElement('button');
            btn.className = 'w-full bg-card border border-subtle rounded-2xl p-4 flex justify-between items-center text-sm';
            btn.innerHTML = `<span class="font-semibold">${escapeHtml(d.name)}</span><span class="text-muted">${d.words.length} ${t('learn_words_suffix')} <i class="fa-solid fa-chevron-right ml-1 text-xs"></i></span>`;
            btn.onclick = () => startLearnSession(d.id);
            list.appendChild(btn);
        });
    }

    async function startLearnSession(deckIdOrAll) {
        let words = [], label = '';

        if (deckIdOrAll === 'all') {
            words = decks.flatMap(d => d.words);
            label = t('learn_all_lists');
            currentLearnDeck = null;
        } else {
            const deck = decks.find(d => d.id === deckIdOrAll);
            if (!deck) return;
            words = deck.words;
            label = deck.name;
            currentLearnDeck = deck;
            appState.lastLearnDeckId = deck.id;
            await saveState();
        }

        document.getElementById('learn-deck-name-label').textContent = label;
        document.getElementById('learn-deck-selector').classList.add('hidden');
        document.getElementById('learn-session').classList.remove('hidden');

        currentCardIndex = 0;
        isCardFlipped    = false;
        window._learnWords = words;
        updateLearnCounter();
        renderFlashcard();
    }

    function exitLearnSession() {
        currentLearnDeck = null;
        window._learnWords = [];
        appState.lastLearnDeckId = null;
        saveState();
        initLearnView();
    }

    function updateLearnCounter() {
        const el = document.getElementById('learn-counter');
        if (el) el.textContent = `${appState.learnedToday} / ${appState.dailyGoal}`;
    }

    function renderFlashcard() {
        const container  = document.getElementById('flashcard-container');
        const actionBtns = document.getElementById('learn-actions');
        if (!container) return;

        const words = window._learnWords || [];
        if (words.length === 0) {
            const parts = t('learn_no_vocab').split('\n');
            container.innerHTML = `
                <div class="w-full h-full flex items-center justify-center bg-card rounded-3xl border border-subtle p-8 text-center" style="min-height:200px">
                    <p class="text-muted">${parts[0]}<br>${parts[1] ? `<strong>${parts[1]}</strong>` : ''}</p>
                </div>`;
            if (actionBtns) { actionBtns.style.opacity='0'; actionBtns.style.pointerEvents='none'; }
            return;
        }

        const word = words[currentCardIndex];
        container.innerHTML = `
            <div id="flashcard" class="preserve-3d flip-transition cursor-pointer shadow-xl rounded-3xl" onclick="flipCard()" style="position:relative;width:100%;height:100%;min-height:220px">
                <div class="absolute inset-0 backface-hidden bg-card rounded-3xl border border-subtle flex flex-col justify-center items-center p-8 text-center">
                    <span class="absolute top-4 left-4 text-xs font-bold text-muted">${t('learn_front')}</span>
                    <h2 class="text-4xl font-bold">${escapeHtml(word.en)}</h2>
                    <p class="mt-6 text-muted text-sm"><i class="fa-solid fa-hand-pointer mr-2"></i>${t('learn_flip_hint')}</p>
                </div>
                <div class="absolute inset-0 backface-hidden rotate-y-180 accent-bg rounded-3xl flex flex-col justify-center items-center p-8 text-center text-white">
                    <span class="absolute top-4 left-4 text-xs font-bold text-white/60">${t('learn_back')}</span>
                    <h2 class="text-3xl font-bold">${escapeHtml(word.de)}</h2>
                </div>
            </div>`;

        const card = document.getElementById('flashcard');
        card.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, false);
        card.addEventListener('touchend',   e => { touchEndX   = e.changedTouches[0].screenX; handleSwipe(); }, false);

        isCardFlipped = false;
        if (actionBtns) { actionBtns.style.opacity='0'; actionBtns.style.pointerEvents='none'; }
    }

    function flipCard() {
        const card = document.getElementById('flashcard');
        const btns = document.getElementById('learn-actions');
        if (!card || !btns) return;
        isCardFlipped = !isCardFlipped;
        if (isCardFlipped) {
            card.classList.add('rotate-y-180');
            btns.style.opacity = '1'; btns.style.pointerEvents = 'auto';
        } else {
            card.classList.remove('rotate-y-180');
            btns.style.opacity = '0'; btns.style.pointerEvents = 'none';
        }
    }

    function handleCardResult(type) {
        if (type === 'known') incrementGoal();
        nextCard('left');
    }

    function nextCard(dir = 'left') {
        const words = window._learnWords || [];
        if (words.length <= 1) { renderFlashcard(); return; }
        const card = document.getElementById('flashcard');
        if (!card) return;
        card.classList.add(dir === 'left' ? 'swipe-left' : 'swipe-right');
        setTimeout(() => {
            currentCardIndex = dir === 'left'
                ? (currentCardIndex + 1) % words.length
                : (currentCardIndex - 1 + words.length) % words.length;
            isCardFlipped = false;
            renderFlashcard();
        }, 300);
    }

    function handleSwipe() {
        const t50 = 50;
        if (touchEndX < touchStartX - t50) nextCard('left');
        if (touchEndX > touchStartX + t50) nextCard('right');
    }

    // ══════════════════════════════════════════════
    //  Goals & Streak
    // ══════════════════════════════════════════════
    function checkStreak() {
        const today = new Date().toDateString();
        if (appState.lastStudyDate !== today) {
            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);
            if (appState.lastStudyDate !== yesterday.toDateString() && appState.lastStudyDate !== '') {
                appState.streak = 0;
            }
            appState.learnedToday = 0;
        }
        saveState();
    }

    async function incrementGoal() {
        const today = new Date().toDateString();
        if (appState.learnedToday === 0 && appState.lastStudyDate !== today) {
            appState.streak += 1;
            appState.lastStudyDate = today;
        }
        appState.learnedToday += 1;
        await saveState();
        updateLearnCounter();
    }

    function setDailyGoal() {
        const v = prompt(t('prompt_daily_goal'), appState.dailyGoal);
        if (v && !isNaN(v)) { appState.dailyGoal = parseInt(v, 10); saveState(); }
    }

    function updateGoalUI() {
        const el1 = document.getElementById('streak-count');
        const el2 = document.getElementById('goal-text');
        const el3 = document.getElementById('goal-progress');
        if (el1) el1.textContent = appState.streak;
        if (el2) el2.textContent = `${appState.learnedToday} / ${appState.dailyGoal} ${t('goals_cards_learned')}`;
        if (el3) el3.style.width = `${Math.min((appState.learnedToday / appState.dailyGoal) * 100, 100)}%`;
    }

    // ══════════════════════════════════════════════
    //  Utilities
    // ══════════════════════════════════════════════
    function escapeHtml(str) {
        return String(str)
            .replace(/&/g,'&amp;').replace(/</g,'&lt;')
            .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ══════════════════════════════════════════════
    //  Boot
    // ══════════════════════════════════════════════
    document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
